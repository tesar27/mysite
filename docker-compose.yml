services:
    mysite:
        build: .
        container_name: mysite
        restart: unless-stopped
        ports:
            - "127.0.0.1:3000:8080" # only loopback — host Nginx proxies to this
        networks:
            - shared_web

networks:
    shared_web:
        external: true # created once on VPS: docker network create shared_web
